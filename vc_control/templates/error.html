{% extends "base.html" %}
{% set page_name = "error" %}

{% block content %}
<section class="auth-panel">
  <div class="auth-panel-copy">
    <span class="frame-eyebrow">エラー</span>
    <h1>{{ title }}</h1>
    <p>OAuth 認証またはWeb設定の処理で問題が発生しました。</p>
  </div>

  <article class="status-box danger">
    <strong>詳細</strong>
    <p>{{ error_message }}</p>
  </article>

  {% if error_details %}
    <div class="stack-list">
      {% for item in error_details %}
        <article class="status-box warning">
          <strong>確認事項</strong>
          <p>{{ item }}</p>
        </article>
      {% endfor %}
    </div>
  {% endif %}

  <div class="form-actions">
    <a href="{{ next_url }}" class="button button-primary">{{ next_label }}</a>
  </div>
</section>
{% endblock %}
