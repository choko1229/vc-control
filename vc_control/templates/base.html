<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} | VC Control</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">

  <script>
    (() => {
      const storageKey = "vc-control-theme-preference";
      const getSystemTheme = () => (
        window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark"
      );

      try {
        const preference = localStorage.getItem(storageKey) || "dark";
        document.documentElement.dataset.themePreference = preference;
        document.documentElement.dataset.theme = preference === "system" ? getSystemTheme() : preference;
      } catch (error) {
        document.documentElement.dataset.themePreference = "dark";
        document.documentElement.dataset.theme = "dark";
      }
    })();
  </script>

  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/discord-flat.css">

  {% block head_extra %}{% endblock %}
</head>

<body data-page="{{ page_name | default('default') }}">
  <div class="auth-shell">
    <aside class="auth-rail">
      <div class="rail-brand">
        <span class="rail-brand-mark">VC</span>
      </div>

      <div class="auth-rail-copy">
        <strong>VC Control</strong>
        <small>Discord VC Dashboard</small>
      </div>
    </aside>

    <main class="auth-stage">
      {{ self.content() }}
    </main>
  </div>

  <div id="toast-stack" class="toast-stack" aria-live="polite" aria-atomic="true"></div>

  <script src="/static/js/toast.js" defer></script>
  <script src="/static/js/theme.js" defer></script>
  <script src="/static/js/app.js" defer></script>

  {% block scripts_extra %}{% endblock %}
</body>
</html>
