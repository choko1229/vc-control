<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} | VC Control</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js" defer></script>
</head>
<body data-page="{{ page_name | default('default') }}" data-guild-id="{{ guild_id | default('') }}" data-root-channel-id="{{ root_channel_id | default('') }}">
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>VC Control</h1>
        <small>Discord ボイスチャンネル管理 Bot / Dashboard</small>
      </div>
      <nav class="nav">
        {% if current_user %}
          <a class="secondary" href="/dashboard/me">ホーム</a>
          <a class="secondary" href="/dashboard/stats/me">自分の通話時間</a>
          <a class="secondary" href="/dashboard/rankings">ランキング</a>
          <a class="secondary" href="/logout">ログアウト</a>
        {% else %}
          <a href="/login">Discordでログイン</a>
        {% endif %}
      </nav>
    </header>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
