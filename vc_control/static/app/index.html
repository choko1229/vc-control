<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800&family=M+PLUS+Rounded+1c:wght@600;700;800&family=Noto+Sans:wght@400;500;700&display=swap"

    <link

      rel="stylesheet"
    />
    <title>VC Control</title>
    <script>
      (function () {
        try {
          var preference = localStorage.getItem('vc-control-theme-preference') || 'dark';
          var resolved = preference === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : preference;
          document.documentElement.dataset.theme = resolved;
        } catch (error) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
      (function () {
        var supported = ['ja', 'en'];
        try {
          var stored = localStorage.getItem('vc-control-language');
          var lang = stored && supported.indexOf(stored) !== -1
            ? stored
            : (supported.indexOf(navigator.language.slice(0, 2)) !== -1 ? navigator.language.slice(0, 2) : 'ja');
          document.documentElement.lang = lang;
        } catch (error) {
          document.documentElement.lang = 'ja';
        }
      })();
    </script>
